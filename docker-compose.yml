version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: documind_postgres
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind_password
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind_backend
    environment:
      DATABASE_URL: postgresql://documind:documind_password@postgres:5432/documind
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
